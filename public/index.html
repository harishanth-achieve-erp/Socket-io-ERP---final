<!doctype html>
<html>
  <head>
    <title>ERP Event Notifications</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <style>
      body {
        background: #f5f7fb;
      }

      .card-custom {
        border: 0;
        border-radius: 14px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      }

      .table td,
      .table th {
        vertical-align: middle;
      }

      .live-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        display: inline-block;
      }

      .form-wrapper {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="fw-bold mb-1">ERP Notifications</h4>
          <small class="text-muted"> Live ERP event tracking system </small>
        </div>

      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <div class="card card-custom p-3">
            <small class="text-muted">Total Events</small>
            <h3 class="mb-0 fw-bold" id="stat-total">0</h3>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card card-custom p-3">
            <small class="text-muted">Sources</small>
            <h3 class="mb-0 fw-bold" id="stat-sources">0</h3>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-primary" id="toggleBtn" onclick="toggleForm()">
          + Create Event
        </button>
      </div>

      <div class="card card-custom mb-4 form-wrapper" id="event-form">
        <div class="card-body">
          <h5 class="fw-semibold mb-3">Create New Event</h5>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Title</label>
              <input
                type="text"
                class="form-control"
                id="f-title"
                placeholder="Enter title"
              />
            </div>

            <div class="col-md-6">
              <label class="form-label">Type</label>
              <select class="form-select" id="f-type">
                <option value="order">Order</option>
                <option value="invoice">Invoice</option>
                <option value="shipment">Shipment</option>
                <option value="alert">Alert</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Source</label>
              <select class="form-select" id="f-source">
                <option value="ERP">ERP</option>
                <option value="CRM">CRM</option>
                <option value="WMS">WMS</option>
                <option value="Manual">Manual</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea
                class="form-control"
                id="f-desc"
                rows="3"
                placeholder="Enter description"
              ></textarea>
            </div>
          </div>

          <div class="mt-4 d-flex justify-content-end gap-2">
            <button class="btn btn-outline-secondary" onclick="toggleForm()">
              Cancel
            </button>

            <button
              class="btn btn-primary"
              id="submitBtn"
              onclick="submitEvent()"
            >
              Submit Event
            </button>
          </div>
        </div>
      </div>

      <div class="card card-custom">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-semibold mb-0">Live Notifications</h5>

          </div>

          <div class="table-responsive">
            <table class="table align-middle table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>Title</th>
                  <th>Description</th>
                  <th>Type</th>
                  <th>Source</th>
                  <th>Time</th>
                </tr>
              </thead>

              <tbody id="notifications"></tbody>
            </table>
          </div>

          <div class="text-center text-muted py-4" id="empty-state">
            No events available.
          </div>
        </div>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const typeBadge = {
        order: 'Order',
        invoice: 'Invoice',
        shipment: 'Shipment',
        alert: 'Alert',
        other: 'Other',
      };

      let formVisible = false;

      function toggleForm() {
        formVisible = !formVisible;
        const form = document.getElementById("event-form");
        form.style.display = formVisible ? "block" : "none";
        document.getElementById("toggleBtn").textContent = formVisible
          ? "Close Form"
          : "+ Create Event";
      }

      function renderAllEvents(data) {
        const tbody = document.getElementById("notifications");
        tbody.innerHTML = "";

        if (data.length === 0) {
          document.getElementById("empty-state").style.display = "block";
          document.getElementById("stat-total").textContent = 0;
          document.getElementById("stat-sources").textContent = 0;
          return;
        }

        document.getElementById("empty-state").style.display = "none";
        const sources = new Set();

        data.forEach((event) => {
          const tr = document.createElement("tr");
          const time = new Date(event.created_at).toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          });
          tr.innerHTML = `
          <td class="fw-semibold">${event.title}</td>
          <td>${event.description}</td>
          <td>${typeBadge[event.type] || typeBadge.other}</td>
          <td>${event.source}</td>
          <td class="text-muted">${time}</td>
        `;
          tbody.appendChild(tr);
          sources.add(event.source);
        });

        document.getElementById("stat-total").textContent = data.length;
        document.getElementById("stat-sources").textContent = sources.size;
      }

      async function submitEvent() {
        const title = document.getElementById("f-title").value.trim();
        const description = document.getElementById("f-desc").value.trim();

        if (!title || !description) {
          alert("Title and Description are required");
          return;
        }

        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
          await fetch("/events", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title,
              description,
              type: document.getElementById("f-type").value,
              source: document.getElementById("f-source").value,
            }),
          });

          document.getElementById("f-title").value = "";
          document.getElementById("f-desc").value = "";
          toggleForm();
        } catch (e) {
          alert("Failed to submit event");
        } finally {
          btn.disabled = false;
          btn.textContent = "Submit Event";
        }
      }

      const socket = io();

      socket.on("connect", () => {
        console.log("Socket connected:", socket.id);
        // no loadExistingEvents() needed — server pushes data automatically on connect
      });

      socket.on("all-events", (data) => {
        renderAllEvents(data);
      });
    </script>
  </body>
</html>
